<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Mine Bets</title>
<style>
body{background:#050505;color:white;font-family:Arial}
.card{background:#111;margin:15px;padding:20px;border-radius:12px;border:1px solid #222}
.pending{color:#facc15}
</style>
</head>

<body>

<h1>Mine Bets</h1>

<div id="bets"></div>

<script>

let bets = JSON.parse(localStorage.getItem("bets")) || []

let html = ""

bets.forEach(b=>{

html += `
<div class="card">
<h3>${b.team}</h3>
<p>Stake: ${b.stake}</p>
<p>Odds: ${b.odds}</p>
<p class="${b.status}">Status: ${b.status}</p>
</div>
`

})

document.getElementById("bets").innerHTML = html

</script>

</body>
</html>
