<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Mine Bets</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

.card{
background:#121212;
margin:10px auto;
padding:15px;
max-width:500px;
border-radius:10px;
border:1px solid #222;
}
</style>
</head>

<body>

<h2>Mine Bets</h2>

<div id="bets"></div>

<script>

let bets = JSON.parse(localStorage.getItem("bets")) || [];

let html="";

bets.slice().reverse().forEach(b=>{
html+=`
<div class="card">
<h3>${b.team}</h3>
<p>Stake: ${b.stake}</p>
<p>Status: ${b.status}</p>
</div>`;
});

document.getElementById("bets").innerHTML=html;

</script>

</body>
</html>
