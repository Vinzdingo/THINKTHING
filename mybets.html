<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Mine Bets</title>

<style>
/* samme CSS som index */
</style>
</head>

<body>

<div class="topbar"><div>Mine Bets</div></div>

<div class="sidebar">
<a href="index.html">Home</a>
<a href="bets.html">Bets</a>
<a href="profile.html">Profil</a>
</div>

<div class="main" id="bets"></div>

<script>

function load(){

let bets = JSON.parse(localStorage.getItem("bets"))||[];
let html="";

bets.slice().reverse().forEach(b=>{
html+=`
<div class="card">
<h3>${b.team}</h3>
<p class="small">Stake ${b.stake}</p>
<p>Status: ${b.status}</p>
</div>`;
});

document.getElementById("bets").innerHTML=html;
}

load();
setInterval(load,2000);

</script>

</body>
</html>
