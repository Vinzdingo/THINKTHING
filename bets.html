<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Bets</title>

<style>
body{margin:0;background:#050505;color:white;font-family:Arial}

nav{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
background:#0a0a0a;
border-bottom:1px solid #222;
}

.menu a{
color:#aaa;
margin-left:15px;
text-decoration:none;
}

.menu a:hover{color:#dc2626}

.container{
margin-top:100px;
padding:20px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
}

.card{
background:#111;
border:1px solid #222;
padding:18px;
border-radius:14px;
margin-bottom:15px;
}

button{
background:#dc2626;
border:none;
padding:10px 14px;
color:white;
border-radius:10px;
margin:5px;
cursor:pointer;
}

button:hover{background:#ef4444}

.small{color:#9ca3af;font-size:13px}
.live{color:#22c55e}
</style>
</head>

<body>

<nav>
<div>⚽ Bets</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="mybets.html">Mine Bets</a>
<a href="profile.html">Profil</a>
</div>
</nav>

<div class="container" id="matches"></div>

<script>

let points = Number(localStorage.getItem("points")) || 1000
let bets = JSON.parse(localStorage.getItem("bets")) || []

function save(){
localStorage.setItem("points",points)
localStorage.setItem("bets",JSON.stringify(bets))
}

function bet(team,id,odds){

let stake = Number(prompt("Stake?"))
if(!stake || stake<=0) return
if(stake>points) return alert("Ikke nok points")

points -= stake

bets.push({
id:Date.now(),
matchId:id,
team,
odds,
stake,
potential:Math.round(stake*odds),
status:"pending"
})

save()
}

async function load(){

const res = await fetch(
"https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328"
)

const data = await res.json()
render(data.events || [])
check(data.events || [])
}

function render(matches){

let html=""

matches.slice(0,10).forEach(m=>{

html += `
<div class="card">
<h2>${m.strHomeTeam} vs ${m.strAwayTeam}</h2>
<p class="small">${m.dateEvent}</p>
<p class="live">LIVE MATCH</p>

<button onclick="bet('${m.strHomeTeam}',${m.idEvent},2.1)">
${m.strHomeTeam}
</button>

<button onclick="bet('Draw',${m.idEvent},3.2)">
X
</button>

<button onclick="bet('${m.strAwayTeam}',${m.idEvent},2.8)">
${m.strAwayTeam}
</button>
</div>
`
})

document.getElementById("matches").innerHTML = html
}

function check(matches){

bets.forEach(b=>{

if(b.status!=="pending") return

let m = matches.find(x=>x.idEvent==b.matchId)
if(!m || !m.intHomeScore) return

let h = Number(m.intHomeScore)
let a = Number(m.intAwayScore)

let win =
(b.team==="Draw" && h===a) ||
(b.team===m.strHomeTeam && h>a) ||
(b.team===m.strAwayTeam && a>h)

if(win){
b.status="won"
points += b.potential
}else{
b.status="lost"
}

save()
})

}

load()
setInterval(load,60000)

</script>

</body>
</html>
