<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Bets</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

nav{
padding:20px;
border-bottom:1px solid #222;
}

nav a{
color:#aaa;
margin:0 10px;
text-decoration:none;
}

.card{
background:#121212;
margin:15px auto;
padding:15px;
max-width:600px;
border-radius:10px;
border:1px solid #222;
}

button{
padding:10px;
margin:5px;
background:#222;
border:1px solid #333;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{background:#dc2626}

.points{
color:#dc2626;
margin-top:10px;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="mybets.html">Mine Bets</a>
<a href="profile.html">Profil</a>
</nav>

<h2>Matches</h2>
<div class="points" id="points"></div>

<div id="matches"></div>

<script>

let points = Number(localStorage.getItem("points")) || 1000;
let bets = JSON.parse(localStorage.getItem("bets")) || [];

function save(){
localStorage.setItem("points",points);
localStorage.setItem("bets",JSON.stringify(bets));
}

document.getElementById("points").innerText = points + " points";

async function load(){

const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328");
const data = await res.json();

let html="";

(data.events||[]).slice(0,10).forEach(m=>{

html+=`
<div class="card">
<h3>${m.strHomeTeam} vs ${m.strAwayTeam}</h3>
<p>${m.dateEvent}</p>

<button onclick="bet('${m.strHomeTeam}',${m.idEvent},2)">Home</button>
<button onclick="bet('Draw',${m.idEvent},3)">X</button>
<button onclick="bet('${m.strAwayTeam}',${m.idEvent},2.5)">Away</button>
</div>`;
});

document.getElementById("matches").innerHTML=html;
}

function bet(team,id,odds){

let stake = Number(prompt("Stake?"));
if(!stake || stake>points) return;

points -= stake;

bets.push({
id:Date.now(),
team,
matchId:id,
odds,
stake,
status:"pending"
});

save();
document.getElementById("points").innerText = points;
}

load();

</script>

</body>
</html>
