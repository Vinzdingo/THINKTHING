<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bets</title>

<style>
body{margin:0;font-family:Arial;background:#050505;color:white}
nav{display:flex;justify-content:space-between;padding:20px;background:#0a0a0a;border-bottom:1px solid #222}
.match{background:#111;margin:15px;padding:20px;border-radius:12px;border:1px solid #222}
button{background:#dc2626;color:white;border:none;padding:10px;margin:5px;border-radius:10px;cursor:pointer}
button:hover{background:#ef4444}
.live{color:#22c55e}
</style>
</head>

<body>

<nav>
<div>Bets LIVE ENGINE</div>
<div id="points"></div>
</nav>

<div id="matches"></div>

<script>

let points = Number(localStorage.getItem("points")) || 1000
let bets = JSON.parse(localStorage.getItem("bets")) || []

function save(){
localStorage.setItem("points",points)
localStorage.setItem("bets",JSON.stringify(bets))
}

function update(){
document.getElementById("points").innerText = points + " points"
}

const matches = [
{
id:1,
home:"Spanien",
away:"Frankrig",
odds:[2.1,3.2,3.5],
result:null
},
{
id:2,
home:"Danmark",
away:"Brasilien",
odds:[4.5,3.8,1.7],
result:null
},
{
id:3,
home:"Argentina",
away:"England",
odds:[2.6,3.1,2.7],
result:null
}
]

// 🎮 BET FUNCTION
function bet(team,odds){

let stake = Number(prompt("Stake?"))

if(!stake || stake <= 0) return
if(stake > points) return alert("Ikke nok points")

points -= stake

bets.push({
id:Date.now(),
matchId: Math.floor(Math.random()*3)+1,
team,
odds,
stake,
potential: Math.round(stake * odds),
status:"pending"
})

save()
update()

alert("Bet placeret")
}

// ⚽ SIMULER KAMP RESULTAT
function simulateMatches(){

matches.forEach(m=>{

if(m.result) return

let r = Math.random()

if(r < 0.4) m.result = "home"
else if(r < 0.7) m.result = "draw"
else m.result = "away"

})

// check bets
bets.forEach(b=>{

if(b.status !== "pending") return

let match = matches.find(m=>m.id === b.matchId)

if(!match) return

let win =
(match.result === "home" && b.team === match.home) ||
(match.result === "away" && b.team === match.away) ||
(match.result === "draw" && b.team === "Uafgjort")

if(win){
b.status = "won"
points += b.potential
}else{
b.status = "lost"
}

})

save()
}

// render
function render(){

let html=""

matches.forEach(m=>{
html += `
<div class="match">
<h2>${m.home} vs ${m.away}</h2>
<p class="live">Result: ${m.result || "LIVE..."}</p>

<button onclick="bet('${m.home}',${m.odds[0]})">${m.home} ${m.odds[0]}</button>
<button onclick="bet('Uafgjort',${m.odds[1]})">U ${m.odds[1]}</button>
<button onclick="bet('${m.away}',${m.odds[2]})">${m.away} ${m.odds[2]}</button>
</div>
`
})

document.getElementById("matches").innerHTML = html
}

// LOOP = LIVE ENGINE
function loop(){
simulateMatches()
render()
update()
}

loop()
setInterval(loop,5000)

</script>

</body>
</html>
