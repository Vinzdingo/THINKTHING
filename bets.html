<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bets</title>

<style>
body{margin:0;font-family:Arial;background:#050505;color:white}
nav{display:flex;justify-content:space-between;padding:20px;background:#0a0a0a;border-bottom:1px solid #222}
a{color:#aaa;text-decoration:none;margin-left:20px}
a:hover{color:#dc2626}

.match{
background:#111;
margin:15px;
padding:20px;
border-radius:14px;
border:1px solid #222;
}

button{
background:#dc2626;
color:white;
border:none;
padding:10px;
margin:5px;
border-radius:10px;
cursor:pointer;
}
button:hover{background:#ef4444}

.points{color:#22c55e}
</style>
</head>

<body>

<nav>
<div>Bets</div>
<div id="points"></div>
</nav>

<div id="matches"></div>

<script>

let points = Number(localStorage.getItem("points")) || 1000
let bets = JSON.parse(localStorage.getItem("bets")) || []

function save(){
localStorage.setItem("points",points)
localStorage.setItem("bets",JSON.stringify(bets))
}

function update(){
document.getElementById("points").innerText = points + " points"
}

const matches = [
{home:"Spanien",away:"Frankrig",odds:[2.1,3.2,3.5]},
{home:"Danmark",away:"Brasilien",odds:[4.5,3.8,1.7]},
{home:"Argentina",away:"England",odds:[2.6,3.1,2.7]}
]

function bet(team,odds){

let stake = prompt("Stake?")
stake = Number(stake)

if(!stake || stake <= 0) return
if(stake > points) return alert("Ikke nok points")

points -= stake

bets.push({
id:Date.now(),
team,
odds,
stake,
potential: Math.round(stake * odds),
status:"pending"
})

save()
update()

alert("Bet placeret")
}

function load(){

let html = ""

matches.forEach(m=>{
html += `
<div class="match">
<h2>${m.home} vs ${m.away}</h2>

<button onclick="bet('${m.home}',${m.odds[0]})">${m.home} ${m.odds[0]}</button>
<button onclick="bet('Uafgjort',${m.odds[1]})">U ${m.odds[1]}</button>
<button onclick="bet('${m.away}',${m.odds[2]})">${m.away} ${m.odds[2]}</button>
</div>
`
})

document.getElementById("matches").innerHTML = html
}

update()
load()

</script>

</body>
</html>
