<!DOCTYPE html>

<html lang="da">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Bet uden afhængighed</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
height:80px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 50px;
background:rgba(5,5,5,.9);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.05);
z-index:100;
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing:1px;
}

.logo span{
color:#dc2626;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
opacity:.8;
transition:.3s;
}

.menu a:hover{
opacity:1;
color:#dc2626;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.hero-content{
max-width:900px;
}

.hero h1{
font-size:90px;
line-height:1;
margin-bottom:20px;
}

.hero h1 span{
color:#dc2626;
}

.hero p{
font-size:22px;
color:#9ca3af;
max-width:700px;
margin:auto;
line-height:1.7;
}

.cta{
margin-top:40px;
}

.btn{
padding:18px 40px;
background:#dc2626;
border:none;
color:white;
font-size:18px;
border-radius:16px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
background:#ef4444;
}

.glow{
position:absolute;
width:500px;
height:500px;
background:#dc2626;
filter:blur(250px);
opacity:.15;
top:20%;
left:50%;
transform:translateX(-50%);
pointer-events:none;
}

.stats{
display:flex;
justify-content:center;
gap:30px;
margin-top:60px;
flex-wrap:wrap;
}

.stat{
background:#111;
padding:25px;
border-radius:20px;
min-width:220px;
border:1px solid rgba(255,255,255,.05);
}

.stat h3{
font-size:30px;
margin-bottom:8px;
}

.stat p{
font-size:14px;
color:#9ca3af;
}

</style>

</head>

<body>

<div class="glow"></div>

<nav>

<div class="logo">
Bet <span>uden afhængighed</span>
</div>

<div class="menu">
<a href="bets.html">Læg Bets</a>
<a href="mybets.html">Mine Bets</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="profile.html">Profil</a>
</div>

</nav>

<section class="hero">

<div class="hero-content">

<h1>
Bet uden <span>afhængighed</span>
</h1>

<p>
Forudsig VM-kampe, konkurrér mod venner
og byg din egen pointsaldo.
Ingen rigtige penge.
Kun strategi, fodbold og konkurrencer.
</p>

<div class="cta">
<button class="btn">
Kom i gang
</button>
</div>

<div class="stats">

<div class="stat">
<h3>1000</h3>
<p>Startpoint</p>
</div>

<div class="stat">
<h3>64</h3>
<p>VM kampe</p>
</div>

<div class="stat">
<h3>∞</h3>
<p>Muligheder</p>
</div>

</div>

</div>

</section>

</body>
</html>
