<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bet uden afhængighed</title>

<style>
:root{
--bg:#050505;
--card:#111;
--border:#222;
--red:#dc2626;
--muted:#9ca3af;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:var(--bg);
color:white;
animation:fade .25s ease;
}

@keyframes fade{from{opacity:0}to{opacity:1}}

nav{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
background:rgba(10,10,10,.9);
backdrop-filter:blur(15px);
border-bottom:1px solid var(--border);
}

.logo span{color:var(--red)}

.menu a{
color:var(--muted);
text-decoration:none;
margin-left:15px;
}

.menu a:hover{color:var(--red)}

.container{
margin-top:110px;
padding:20px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

.card{
background:var(--card);
border:1px solid var(--border);
padding:20px;
border-radius:14px;
margin-bottom:15px;
}

button{
background:var(--red);
border:none;
color:white;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
}

.small{color:var(--muted)}
</style>
</head>

<body>

<nav>
<div class="logo">Bet <span>uden afhængighed</span></div>

<div class="menu">
<a href="index.html">Home</a>
<a href="bets.html">Bets</a>
<a href="mybets.html">Mine Bets</a>
<a href="profile.html">Profil</a>
</div>
</nav>

<div class="container">

<div class="card">
<h1>🎮 Betting Game</h1>
<p class="small">Rigtige kampe • Simulerede odds • Ingen penge</p>
</div>

<div class="card">
<p class="small">⚠️ Dette er kun et spil</p>
</div>

<div class="card">
<button onclick="location.href='bets.html'">Start spil</button>
</div>

</div>

<script>
if(!localStorage.getItem("points")) localStorage.setItem("points",1000)
if(!localStorage.getItem("bets")) localStorage.setItem("bets","[]")
</script>

</body>
</html>
