<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bet uden afhængighed</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

nav{
position:fixed;
top:0;
width:100%;
height:80px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 50px;
background:rgba(5,5,5,.9);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.05);
z-index:100;
}

.logo{
font-size:24px;
font-weight:700;
}

.logo span{color:#dc2626}

.menu a{
color:white;
text-decoration:none;
opacity:.8;
margin-left:20px;
}

.menu a:hover{color:#dc2626}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
position:relative;
}

.hero h1{
font-size:80px;
line-height:1;
}

.hero h1 span{color:#dc2626}

.hero p{
color:#9ca3af;
max-width:600px;
margin:20px auto;
line-height:1.6;
}

.btn{
margin-top:20px;
padding:16px 40px;
background:#dc2626;
border:none;
color:white;
border-radius:14px;
cursor:pointer;
font-size:16px;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
background:#ef4444;
}

.glow{
position:absolute;
width:600px;
height:600px;
background:#dc2626;
filter:blur(250px);
opacity:.15;
top:20%;
left:50%;
transform:translateX(-50%);
z-index:-1;
}

.badge{
display:inline-block;
margin-top:20px;
padding:10px 14px;
background:#111;
border:1px solid #222;
border-radius:10px;
color:#facc15;
}

.stats{
display:flex;
gap:20px;
justify-content:center;
margin-top:50px;
flex-wrap:wrap;
}

.stat{
background:#111;
border:1px solid #222;
padding:20px;
border-radius:14px;
min-width:180px;
}

.stat h2{
color:#dc2626;
}
</style>

</head>

<body>

<div class="glow"></div>

<nav>
<div class="logo">Bet <span>uden afhængighed</span></div>

<div class="menu">
<a href="index.html">Home</a>
<a href="bets.html">Læg Bets</a>
<a href="mybets.html">Mine Bets</a>
<a href="profile.html">Profil</a>
</div>
</nav>

<section class="hero">

<div>

<h1>Bet uden <span>afhængighed</span></h1>

<p>
⚠️ For sjov platform.<br>
Ingen penge. Kun strategi, fodbold og points.
</p>

<div class="badge">🎮 Simulation Game</div>

<br>

<button class="btn" onclick="location.href='bets.html'">
Start spil
</button>

<div class="stats">

<div class="stat">
<h2>1000</h2>
<p>Start points</p>
</div>

<div class="stat">
<h2>LIVE</h2>
<p>Matches</p>
</div>

<div class="stat">
<h2>∞</h2>
<p>Fun</p>
</div>

</div>

</div>

</section>

<script>
if(!localStorage.getItem("points")) localStorage.setItem("points",1000)
if(!localStorage.getItem("bets")) localStorage.setItem("bets","[]")
</script>

</body>
</html>
