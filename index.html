<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM Predictor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
}

.balance{
background:#16a34a;
padding:10px 15px;
border-radius:12px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

.section-title{
margin-bottom:20px;
font-size:24px;
}

.match{
background:#1e293b;
padding:25px;
border-radius:18px;
margin-bottom:20px;
}

.teams{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.time{
color:#94a3b8;
margin-bottom:20px;
}

.odds{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.odds button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
background:#2563eb;
color:white;
font-size:18px;
font-weight:bold;
}

.odds button:hover{
opacity:.9;
}

.nav{
display:flex;
gap:15px;
}

.nav a{
color:white;
text-decoration:none;
}

.popup{
position:fixed;
bottom:20px;
right:20px;
background:#16a34a;
padding:15px;
border-radius:12px;
display:none;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<div class="logo">
⚽ VM Predictor
</div>

<div class="nav">
<a href="index.html">Kampe</a>
<a href="mybets.html">Mine Bets</a>
</div>

<div class="balance" id="balance">
1000 Point
</div>

</header>

<div class="container">

<h2 class="section-title">
🔥 VM Kampe
</h2>

<div id="matches"></div>

</div>

<div class="popup" id="popup">
Bet placeret ✔
</div>

<script>

const matches = [

{
id:1,
home:"🇪🇸 Spanien",
away:"🇫🇷 Frankrig",
odds:{
home:2.10,
draw:3.20,
away:3.50
}
},

{
id:2,
home:"🇩🇰 Danmark",
away:"🇧🇷 Brasilien",
odds:{
home:4.50,
draw:3.80,
away:1.70
}
},

{
id:3,
home:"🇦🇷 Argentina",
away:"🏴 England",
odds:{
home:2.60,
draw:3.10,
away:2.70
}
},

{
id:4,
home:"🇩🇪 Tyskland",
away:"🇵🇹 Portugal",
odds:{
home:2.20,
draw:3.40,
away:3.10
}
}

];

let points =
Number(localStorage.getItem("points"));

if(!points){
points = 1000;
localStorage.setItem("points",1000);
}

updateBalance();

function updateBalance(){

document.getElementById("balance").innerText =
points + " Point";

}

function getBets(){

return JSON.parse(
localStorage.getItem("bets")
) || [];

}

function saveBets(bets){

localStorage.setItem(
"bets",
JSON.stringify(bets)
);

}

function placeBet(matchId,team,odds){

let stake =
Number(prompt("Hvor mange point vil du satse?"));

if(!stake) return;

if(stake > points){

alert("Ikke nok point");

return;

}

points -= stake;

localStorage.setItem(
"points",
points
);

updateBalance();

let bets = getBets();

bets.push({

id:Date.now(),

matchId,

team,

stake,

odds,

potentialWin:
Math.round(stake * odds),

status:"pending",

date:new Date().toLocaleString()

});

saveBets(bets);

showPopup();

}

function showPopup(){

const p =
document.getElementById("popup");

p.style.display="block";

setTimeout(()=>{

p.style.display="none";

},2000);

}

function renderMatches(){

const container =
document.getElementById("matches");

container.innerHTML="";

matches.forEach(match=>{

container.innerHTML += `

<div class="match">

<div class="teams">

${match.home}
vs
${match.away}

</div>

<div class="time">

VM 2026

</div>

<div class="odds">

<button onclick="placeBet(
${match.id},
'${match.home}',
${match.odds.home}
)">
${match.home}
<br>
${match.odds.home}
</button>

<button onclick="placeBet(
${match.id},
'Uafgjort',
${match.odds.draw}
)">
Uafgjort
<br>
${match.odds.draw}
</button>

<button onclick="placeBet(
${match.id},
'${match.away}',
${match.odds.away}
)">
${match.away}
<br>
${match.odds.away}
</button>

</div>

</div>

`;

});

}

renderMatches();

</script>

</body>
</html>
