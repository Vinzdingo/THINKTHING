<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil - Bet uden afhængighed</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
}

nav{
height:80px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
border-bottom:1px solid rgba(255,255,255,.05);
background:#050505;
}

.logo{
font-size:24px;
font-weight:700;
}

.logo span{
color:#dc2626;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
opacity:.8;
}

.menu a:hover{
color:#dc2626;
}

.points{
background:#111;
padding:12px 18px;
border-radius:12px;
border:1px solid #222;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.hero{
background:linear-gradient(
135deg,
#111,
#191919
);
border:1px solid #222;
border-radius:28px;
padding:40px;
margin-bottom:30px;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
color:#9ca3af;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:22px;
padding:25px;
}

.card h2{
font-size:34px;
margin-bottom:8px;
}

.card p{
color:#9ca3af;
}

.bigCard{
margin-top:30px;
background:#111;
border:1px solid #222;
border-radius:24px;
padding:30px;
}

.bigCard h2{
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:16px 0;
border-bottom:1px solid #1d1d1d;
}

.row:last-child{
border:none;
}

.label{
color:#9ca3af;
}

.value{
font-weight:700;
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

.yellow{
color:#facc15;
}

</style>

</head>

<body>

<nav>

<div class="logo">
Bet <span>uden afhængighed</span>
</div>

<div class="menu">
<a href="index.html">Forside</a>
<a href="bets.html">Læg Bets</a>
<a href="mybets.html">Mine Bets</a>
<a href="leaderboard.html">Leaderboard</a>
</div>

<div class="points" id="points">
1000 Point
</div>

</nav>

<div class="container">

<div class="hero">

<h1>Min Profil</h1>

<p>
Overblik over din aktivitet og statistik.
</p>

</div>

<div class="stats">

<div class="card">
<h2 id="balance">0</h2>
<p>Pointsaldo</p>
</div>

<div class="card">
<h2 id="betsCount">0</h2>
<p>Antal Bets</p>
</div>

<div class="card">
<h2 id="totalStaked">0</h2>
<p>Samlet Satset</p>
</div>

<div class="card">
<h2 id="potentialWin">0</h2>
<p>Potentiel Gevinst</p>
</div>

</div>

<div class="bigCard">

<h2>Statistik</h2>

<div class="row">
<span class="label">Vundne Bets</span>
<span class="value green" id="won">0</span>
</div>

<div class="row">
<span class="label">Tabte Bets</span>
<span class="value red" id="lost">0</span>
</div>

<div class="row">
<span class="label">Afventende Bets</span>
<span class="value yellow" id="pending">0</span>
</div>

<div class="row">
<span class="label">Winrate</span>
<span class="value" id="winrate">0%</span>
</div>

</div>

</div>

<script>

const points =
Number(
localStorage.getItem("points")
) || 1000;

document
.getElementById("points")
.innerText =
points + " Point";

document
.getElementById("balance")
.innerText =
points;

const bets =
JSON.parse(
localStorage.getItem("bets")
) || [];

let totalStaked = 0;
let totalPotential = 0;

let won = 0;
let lost = 0;
let pending = 0;

bets.forEach(bet=>{

totalStaked += bet.stake;

totalPotential += bet.potential;

if(bet.status === "won"){
won++;
}

else if(bet.status === "lost"){
lost++;
}

else{
pending++;
}

});

document
.getElementById("betsCount")
.innerText =
bets.length;

document
.getElementById("totalStaked")
.innerText =
totalStaked;

document
.getElementById("potentialWin")
.innerText =
totalPotential;

document
.getElementById("won")
.innerText =
won;

document
.getElementById("lost")
.innerText =
lost;

document
.getElementById("pending")
.innerText =
pending;

const finished =
won + lost;

let winrate = 0;

if(finished > 0){

winrate =
Math.round(
(won / finished) * 100
);

}

document
.getElementById("winrate")
.innerText =
winrate + "%";

</script>

</body>
</html>
