<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Profil</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

.card{
background:#121212;
margin:20px auto;
padding:20px;
max-width:400px;
border-radius:10px;
border:1px solid #222;
}
</style>
</head>

<body>

<h2>Profil</h2>

<div class="card" id="stats"></div>

<script>

let bets = JSON.parse(localStorage.getItem("bets")) || [];

let won=0,lost=0,pending=0;

bets.forEach(b=>{
if(b.status==="won")won++;
else if(b.status==="lost")lost++;
else pending++;
});

document.getElementById("stats").innerHTML=`
<p>Won: ${won}</p>
<p>Lost: ${lost}</p>
<p>Pending: ${pending}</p>
<p>Total: ${bets.length}</p>
`;

</script>

</body>
</html>
