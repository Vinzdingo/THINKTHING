<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Profil</title>

<style>
/* samme CSS */
</style>
</head>

<body>

<div class="topbar"><div>Profil</div></div>

<div class="sidebar">
<a href="index.html">Home</a>
<a href="bets.html">Bets</a>
<a href="mybets.html">Mine Bets</a>
</div>

<div class="main" id="stats"></div>

<script>

let bets = JSON.parse(localStorage.getItem("bets"))||[];

let won=0,lost=0,pending=0;

bets.forEach(b=>{
if(b.status==="won")won++;
else if(b.status==="lost")lost++;
else pending++;
});

document.getElementById("stats").innerHTML=`
<div class="card">
<h3>Stats</h3>
<p>Won: ${won}</p>
<p>Lost: ${lost}</p>
<p>Pending: ${pending}</p>
</div>`;
</script>

</body>
</html>
