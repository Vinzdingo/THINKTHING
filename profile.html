
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<style>
body{background:#050505;color:white;font-family:Arial}
.card{background:#111;padding:20px;margin:15px;border-radius:12px}
</style>
</head>

<body>

<h1>Profil</h1>

<div class="card">
<h2 id="points"></h2>
<h3 id="bets"></h3>
</div>

<script>

let points = Number(localStorage.getItem("points")) || 1000
let bets = JSON.parse(localStorage.getItem("bets")) || []

document.getElementById("points").innerText = "Points: " + points
document.getElementById("bets").innerText = "Bets: " + bets.length

</script>

</body>
</html>
